name: OTA Deploy + QR

on:
  push:
    paths:
      - 'ipa/*.ipa'
      - 'install.html'
      - 'scripts/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y qrencode

      - run: mkdir build

      - run: cp ipa/*.ipa build/SORApp.ipa

      - run: |
          chmod +x scripts/generate_manifest.sh
          ./scripts/generate_manifest.sh

      - run: |
          mkdir -p public
          cp build/SORApp.ipa public/
          cp build/manifest.plist public/
          cp install.html public/index.html

      - run: |
          OTA_URL="itms-services://?action=download-manifest&url=https://puji2024.github.io/SOR_IOS_PUBLIC_TEST/manifest.plist"
          qrencode -o public/qrcode.png "$OTA_URL"

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public